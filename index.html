<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      #example-scanning-overlay { display: none; }

      /*Posição do Pop Up*/
      .custom-popup {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.55);
        z-index: 9999;
      }

      /*Caixa do pop up*/
      .custom-popup.is-open { display: flex; }
      .custom-popup-card {
        width: min(92vw, 420px);
        background: #ffffff;
        border-radius: 12px;
        padding: 20px 22px;
        box-sizing: border-box;
        font-family: sans-serif;
        text-align: center;
      }

      /*Texto do Pop Up*/
      .custom-popup-text {
        margin: 0 0 16px;
        color: #111111;
        font-size: 16px;
        white-space: nowrap;
      }

      /*Botão do Pop Up*/
      .custom-popup-actions {
        display: flex;
        justify-content: center;
        gap: 8px;
      }
      .popup-btn {
        border: 0;
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 14px;
        cursor: pointer;
      }
      .popup-btn.cancel { background: #e5e7eb; color: #111827; }
      .popup-btn.confirm { background: #2563eb; color: #ffffff; }
    </style>

    <script>
    let globalTargetStates = {
      0: { visible: false, lastFoundAt: 0 },
      1: { visible: false, lastFoundAt: 0 },
      2: { visible: false, lastFoundAt: 0 }
    };
    let globalPopupOpen = false;

    const openCustomPopup = () => {
      const popup = document.getElementById('custom-popup');
      if (popup) popup.classList.add('is-open');
    };

    const closeCustomPopup = () => {
      const popup = document.getElementById('custom-popup');
      if (popup) popup.classList.remove('is-open');
    };

    document.addEventListener('DOMContentLoaded', () => {
      const cancelBtn = document.getElementById('popup-cancel');
      const continueBtn = document.getElementById('popup-continue');

      if (cancelBtn) {
        cancelBtn.addEventListener('click', closeCustomPopup);
      }

      if (continueBtn) {
        continueBtn.addEventListener('click', () => {
          closeCustomPopup();
          console.log('Pagina Seguinte');
        });
      }

      // Listener global para clique em qualquer parte do ecrã
      document.addEventListener('click', function (event) {
        if (globalPopupOpen) return;
        
        const anyTargetVisible = Object.values(globalTargetStates).some(state => 
          state.visible && Date.now() - state.lastFoundAt >= 250
        );

        if (anyTargetVisible) {
          globalPopupOpen = true;
          openCustomPopup();
          window.setTimeout(() => {
            globalPopupOpen = false;
          }, 250);
        }
      });

      // Listener global para touch
      document.addEventListener('touchend', function (event) {
        if (globalPopupOpen) return;
        
        const anyTargetVisible = Object.values(globalTargetStates).some(state => 
          state.visible && Date.now() - state.lastFoundAt >= 250
        );

        if (anyTargetVisible) {
          event.preventDefault();
          globalPopupOpen = true;
          openCustomPopup();
          window.setTimeout(() => {
            globalPopupOpen = false;
          }, 250);
        }
      });
    });

    AFRAME.registerComponent('clickable-image', {
      init: function () {
        const targetEl = this.el.closest('[mindar-image-target]');

        if (targetEl) {
          const targetIndexAttr = targetEl.getAttribute('mindar-image-target');
          const targetIndex = targetIndexAttr ? parseInt(targetIndexAttr.split(':')[1] || targetIndexAttr.split('=')[1]) : 0;

          targetEl.addEventListener('targetFound', function () {
            globalTargetStates[targetIndex].visible = true;
            globalTargetStates[targetIndex].lastFoundAt = Date.now();
          });

          targetEl.addEventListener('targetLost', function () {
            globalTargetStates[targetIndex].visible = false;
          });
        }
      }
    });
  </script>
  </head>
  <body>
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: yes; uiScanning: yes;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      <a-camera
        position="0 0 0"
        look-controls="enabled: false">
      </a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-image
          src="./assets/hotdog.png"
          position="0 0 0"
          scale="1 0.5"
          clickable-image>
        </a-image>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 1">
        <a-image
          src="./assets/sardine.png"
          position="0 0 0"
          scale="1 0.5"
          clickable-image>
        </a-image>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 2">
        <a-image
          src="./assets/cozido.png"
          position="0 0 0"
          scale="1 0.5"
          clickable-image>
        </a-image>
      </a-entity>
    </a-scene>

    <div id="custom-popup" class="custom-popup">
      <div class="custom-popup-card">
        <p class="custom-popup-text">Tem a certeza de que quer continuar?</p>
        <div class="custom-popup-actions">
          <button id="popup-cancel" class="popup-btn cancel" type="button">Não</button>
          <button id="popup-continue" class="popup-btn confirm" type="button">Sim</button>
        </div>
      </div>
    </div>
  </body>
</html>
