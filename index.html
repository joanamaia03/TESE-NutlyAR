<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      #example-scanning-overlay { display: none; }
      .custom-popup {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.55);
        z-index: 9999;
      }
      .custom-popup.is-open { display: flex; }
      .custom-popup-card {
        width: min(90vw, 320px);
        background: #ffffff;
        border-radius: 12px;
        padding: 16px;
        box-sizing: border-box;
        font-family: sans-serif;
        text-align: center;
      }
      .custom-popup-text {
        margin: 0 0 16px;
        color: #111111;
        font-size: 15px;
      }
      .custom-popup-actions {
        display: flex;
        justify-content: center;
        gap: 8px;
      }
      .popup-btn {
        border: 0;
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 14px;
        cursor: pointer;
      }
      .popup-btn.cancel { background: #e5e7eb; color: #111827; }
      .popup-btn.confirm { background: #2563eb; color: #ffffff; }
    </style>
    <script>
    const openCustomPopup = () => {
      const popup = document.getElementById('custom-popup');
      if (popup) popup.classList.add('is-open');
    };

    const closeCustomPopup = () => {
      const popup = document.getElementById('custom-popup');
      if (popup) popup.classList.remove('is-open');
    };

    document.addEventListener('DOMContentLoaded', () => {
      const cancelBtn = document.getElementById('popup-cancel');
      const continueBtn = document.getElementById('popup-continue');

      if (cancelBtn) {
        cancelBtn.addEventListener('click', closeCustomPopup);
      }

      if (continueBtn) {
        continueBtn.addEventListener('click', () => {
          closeCustomPopup();
          console.log('Pagina Seguinte');
        });
      }
    });

    AFRAME.registerComponent('clickable-image', {
      init: function () {
        let targetVisible = false;
        let lastFoundAt = 0;
        let popupOpen = false;
        const targetEl = this.el.closest('[mindar-image-target]');

        if (targetEl) {
          targetEl.addEventListener('targetFound', function () {
            targetVisible = true;
            lastFoundAt = Date.now();
            popupOpen = false;
          });

          targetEl.addEventListener('targetLost', function () {
            targetVisible = false;
          });
        }

        const tryOpenPopup = function (event) {
          if (event && event.type === 'touchend') {
            event.preventDefault();
          }

          if (!targetVisible || popupOpen || Date.now() - lastFoundAt < 250) {
            return;
          }

          popupOpen = true;
          openCustomPopup();

          window.setTimeout(function () {
            popupOpen = false;
          }, 250);
        };

        this.el.addEventListener('click', tryOpenPopup);
        this.el.addEventListener('touchend', tryOpenPopup);
      }
    });
  </script>
  </head>
  <body>
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: yes; uiScanning: yes;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      <a-camera
        position="0 0 0"
        look-controls="enabled: false"
        cursor="rayOrigin: mouse"
        raycaster="objects: .clickable">
      </a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-image
          src="./assets/hotdog.png"
          class="clickable"
          clickable-image
          position="0 0 0"
          scale="1 0.5">
        </a-image>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 1">
        <a-image
          src="./assets/sardine.png"
          class="clickable"
          clickable-image
          position="0 0 0"
          scale="1 0.5">
        </a-image>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 2">
        <a-image
          src="./assets/cozido.png"
          class="clickable"
          clickable-image
          position="0 0 0"
          scale="1 0.5">
        </a-image>
      </a-entity>
    </a-scene>

    <div id="custom-popup" class="custom-popup">
      <div class="custom-popup-card">
        <p class="custom-popup-text">Tem a certeza de que quer continuar?</p>
        <div class="custom-popup-actions">
          <button id="popup-cancel" class="popup-btn cancel" type="button">Não</button>
          <button id="popup-continue" class="popup-btn confirm" type="button">Sim</button>
        </div>
      </div>
    </div>
  </body>
</html>
